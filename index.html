function CreateEventModal({ onClose, onCreate }) {
  const [nome, setNome] = useState("");
  const [local, setLocal] = useState("");
  const [logradouro, setLogradouro] = useState("");
  const [numero, setNumero] = useState("");
  const [bairro, setBairro] = useState("");
  const [cidade, setCidade] = useState("São Paulo");
  const [dia, setDia] = useState("");
  const [horario, setHorario] = useState("");

  const canCreate =
    nome.trim() && local.trim() && logradouro.trim() && numero.trim() &&
    bairro.trim() && cidade.trim() && dia && horario;

  function handleSubmit() {
    const endereco = `${logradouro.trim()}, ${numero.trim()} - ${bairro.trim()}, ${cidade.trim()}`;
    onCreate({ nome: nome.trim(), local: local.trim(), bairro: bairro.trim(), dia, horario, endereco });
  }

  return (
    <div className="absolute inset-0 z-50 flex items-end sm:items-center justify-center">
      <div className="absolute inset-0 bg-black/40" onClick={onClose} />
      <div
        className="relative w-full max-w-md bg-white shadow-2xl px-7 pt-6 pb-8 max-h-[90vh] overflow-y-auto"
        style={{ borderRadius: "2.5rem 2.5rem 0 0" }}
      >
        <div className="w-10 h-1 bg-neutral-200 rounded-full mx-auto mb-5 sm:hidden" />

        <div className="flex items-center justify-between mb-5">
          <p className="text-lg font-semibold text-neutral-900 tracking-tight">Criar evento</p>
          <button
            onClick={onClose}
            className="w-8 h-8 rounded-full bg-neutral-100 flex items-center justify-center active:scale-95 transition-transform"
          >
            <X size={15} className="text-neutral-500" />
          </button>
        </div>

        <div className="space-y-3">
          <div className="flex items-center gap-3 bg-neutral-100 rounded-3xl px-4 py-3.5">
            <Calendar size={17} className="text-neutral-400 shrink-0" />
            <input
              type="text"
              value={nome}
              onChange={(e) => setNome(e.target.value)}
              placeholder="Nome do evento"
              className="flex-1 bg-transparent text-sm text-neutral-800 placeholder:text-neutral-400 outline-none"
            />
          </div>

          <div className="flex items-center gap-3 bg-neutral-100 rounded-3xl px-4 py-3.5">
            <MapPin size={17} className="text-neutral-400 shrink-0" />
            <input
              type="text"
              value={local}
              onChange={(e) => setLocal(e.target.value)}
              placeholder="Local (ex: Coffee Lab)"
              className="flex-1 bg-transparent text-sm text-neutral-800 placeholder:text-neutral-400 outline-none"
            />

  function handleCreateEvent({ nome, local, bairro, dia, horario, endereco }) {
    const newEvent = {
      id: Date.now(),
      createdBy: PROFILE.name,
      title: nome,
      neighborhood: bairro,
      date: `${dia ? new Date(dia + "T00:00:00").toLocaleDateString("pt-BR", { weekday: "short", day: "2-digit", month: "short" }) : ""} · ${horario}`,

      tint: "bg-blue-50 text-blue-600",
      endereco,
      distance: Math.round(50 + Math.random() * 400), // simula proximidade (geolocalização)

    setEventsList((prev) => [newEvent, ...prev]);

function formatRadius(m) {
  if (m >= 1000) {
    const km = m / 1000;
    return `${km % 1 === 0 ? km : km.toFixed(1)} km`;
  }
  return `${m} m`;
}

// Lista achatada de todas as subtags, com o ícone herdado do interesse pai
const SUB_INTERESTS_FLAT = Object.entries(SUB_INTERESTS).flatMap(([parentId, subs]) =>
  subs.map((s) => ({ ...s, parentId, icon: INTERESTS.find((i) => i.id === parentId)?.icon || Tag }))
);

// Busca uma tag (interesse principal OU subtag de refinamento) pelo id
function findInterestTag(id) {
  return INTERESTS.find((i) => i.id === id) || SUB_INTERESTS_FLAT.find((s) => s.id === id);
}

function RefineSheet({ interest, subOptions, selectedSubs, onToggleSub, onClose }) {
  if (!interest) return null;

  return (
    <div className="absolute inset-0 z-50 bg-white flex flex-col">
      <div className="flex items-center gap-3 px-6 pt-8 pb-4 border-b border-neutral-100 shrink-0">
        <button
          onClick={onClose}
          className="w-10 h-10 rounded-full bg-neutral-100 flex items-center justify-center active:scale-95 transition-transform shrink-0"
        >
          <ArrowLeft size={18} className="text-neutral-700" />
        </button>
        <div
          className="w-11 h-11 rounded-2xl flex items-center justify-center shrink-0"
          style={{ background: "linear-gradient(135deg, #7B2FF7 0%, #F2542D 100%)" }}
        >
          <interest.icon size={20} className="text-white" />
        </div>
        <div className="min-w-0">
          <p className="text-lg font-bold text-neutral-900 tracking-tight leading-tight truncate">
            Refine seu perfil
          </p>
          <p className="text-xs text-neutral-400 mt-0.5 truncate">{interest.label}</p>
        </div>
      </div>

      <div className="flex-1 overflow-y-auto px-6 py-5 space-y-2.5">
        {(subOptions || []).length === 0 && (
          <p className="text-sm text-neutral-400 py-6 text-center">
            Em breve mais opções por aqui.
          </p>
        )}
        {(subOptions || []).map((sub) => {
          const isSelected = selectedSubs.includes(sub.id);
          return (
            <button
              key={sub.id}
              onClick={() => onToggleSub(sub.id)}
              className={`w-full text-left rounded-2xl p-4 border transition-all active:scale-[0.98] ${
                isSelected
                  ? "border-transparent text-white"
                  : "border-neutral-100 bg-neutral-50 text-neutral-800"
              }`}
              style={
                isSelected
                  ? { background: "linear-gradient(135deg, #22D3B0 0%, #2E86DE 100%)" }
                  : undefined
              }
            >
              <div className="flex items-start gap-3">
                <span
                  className={`mt-0.5 w-5 h-5 rounded-full border flex items-center justify-center shrink-0 ${
                    isSelected ? "border-white/60 bg-white/20" : "border-neutral-300"
                  }`}
                >
                  {isSelected && <Check size={12} className="text-white" strokeWidth={3} />}
                </span>
                <div className="min-w-0">
                  <p className={`text-sm font-semibold leading-snug ${isSelected ? "text-white" : "text-neutral-900"}`}>
                    {sub.label}
                  </p>
                  <p className={`text-xs leading-snug mt-1 ${isSelected ? "text-white/85" : "text-neutral-400"}`}>
                    {sub.desc}
                  </p>
                </div>
              </div>
            </button>
          );
        })}
      </div>

      <div className="shrink-0 p-6 pt-3 max-w-md w-full mx-auto bg-white border-t border-neutral-100">
        <button
          onClick={onClose}
          className="w-full text-white rounded-3xl py-4 font-semibold text-[15px] active:scale-[0.98] transition-transform shadow-lg shadow-neutral-900/10"
          style={{ background: "linear-gradient(135deg, #7B2FF7 0%, #F2542D 55%, #FFC93C 100%)" }}
        >
          Salvar
        </button>
      </div>
    </div>
  );
}

function ProfileInterestsScreen({ onContinue, onOpenDrawer, avatarPhoto, onLogout }) {
  const [selected, setSelected] = useState([]);
  const [refineFor, setRefineFor] = useState(null); // interest object aberto no momento
  const [refinements, setRefinements] = useState({}); // { [interestId]: [subIds] }

  const maxTotal = 8;
  const maxPrimary = 3;

  function toggle(id) {
    setSelected((prev) => {
      if (prev.includes(id)) return prev.filter((i) => i !== id);
      if (prev.length >= maxTotal) return prev;
      return [...prev, id];
    });
  }

  const primaryCount = Math.min(selected.length, maxPrimary);
  const secondaryCount = Math.max(0, selected.length - maxPrimary);
  const canContinue = selected.length >= maxPrimary;

  function handleContinue() {
    const refinedSubIds = Object.values(refinements).flat();
    // Envia interesses principais/secundários + subtags de refinamento, tudo junto,
    // para alimentar o cálculo de "interesses em comum" no match.
    onContinue([...selected, ...refinedSubIds]);
  }

  return (
    <div className="h-full w-full bg-white flex flex-col overflow-hidden relative">
      <div className="flex-1 overflow-y-auto">
        <AppHeader onOpenDrawer={onOpenDrawer} avatarPhoto={avatarPhoto} onLogout={onLogout} />

        <div className="px-7 pt-6 pb-6">
        <h1 className="text-2xl font-bold text-neutral-900 tracking-tight">
          Quais são seus interesses?
        </h1>
        <p className="text-sm text-neutral-400 mt-2 leading-relaxed">
          Toque em até 3 interesses principais, depois mais 5 secundários. Isso nos ajuda a
          te mostrar as pessoas e rolês certos.
        </p>

        <div className="grid grid-cols-2 gap-3 mt-6">
          {INTERESTS.map((interest) => {
            const idx = selected.indexOf(interest.id);
            const isSelected = idx !== -1;
            const isPrimary = isSelected && idx < maxPrimary;
            const disabled = !isSelected && selected.length >= maxTotal;

            return (
              <div
                key={interest.id}
                className={`relative rounded-3xl overflow-hidden border transition-all ${
                  isSelected ? "border-transparent" : "border-neutral-100"
                } ${disabled ? "opacity-30" : ""}`}
                style={
                  isSelected
                    ? {
                        background: isPrimary
                          ? "linear-gradient(135deg, #7B2FF7 0%, #F2542D 100%)"
                          : "linear-gradient(135deg, #22D3B0 0%, #2E86DE 100%)",
                      }
                    : { background: "#FAFAFA" }
                }
              >
                <button
                  onClick={() => toggle(interest.id)}
                  disabled={disabled}
                  className="w-full flex flex-col items-start gap-2.5 px-4 pt-4 pb-3 active:scale-[0.98] transition-transform"
                >
                  <div className="w-full flex items-center justify-between">
                    <interest.icon
                      size={20}
                      className={isSelected ? "text-white" : "text-neutral-400"}
                    />
                    {isSelected && (
                      <span className="w-5 h-5 rounded-full bg-white/25 flex items-center justify-center text-[10px] font-bold text-white shrink-0">
                        {idx + 1}
                      </span>
                    )}
                  </div>
                  <span
                    className={`text-sm font-medium text-left leading-snug ${
                      isSelected ? "text-white" : "text-neutral-700"
                    }`}
                  >
                    {interest.label}
                  </span>
                </button>

                <button
                  onClick={(e) => {
                    e.stopPropagation();
                    setRefineFor(interest);
                  }}
                  className={`w-full flex items-center justify-between px-4 py-2.5 text-xs font-medium border-t transition-colors ${
                    isSelected
                      ? "border-white/20 text-white/85 hover:bg-white/10"
                      : "border-neutral-200 text-neutral-400 hover:bg-neutral-100"
                  }`}
                >
                  <span className="flex items-center gap-1.5">
                    Refine seu perfil
                    {(refinements[interest.id]?.length || 0) > 0 && (
                      <span
                        className={`w-4 h-4 rounded-full flex items-center justify-center text-[9px] font-bold ${
                          isSelected ? "bg-white/25 text-white" : "bg-neutral-800 text-white"
                        }`}
                      >
                        {refinements[interest.id].length}
                      </span>
                    )}
                  </span>
                  <ChevronRight size={13} className={isSelected ? "text-white/70" : "text-neutral-300"} />
                </button>
              </div>
            );
          })}
        </div>
        </div>
      </div>

      <div className="shrink-0 p-6 pt-3 max-w-md w-full mx-auto bg-white border-t border-neutral-100">
        <button
          disabled={!canContinue}
          onClick={handleContinue}
          className="w-full text-white rounded-3xl py-4 font-semibold text-[15px] active:scale-[0.98] transition-transform disabled:opacity-30 shadow-lg shadow-neutral-900/10"
          style={{ background: "linear-gradient(135deg, #7B2FF7 0%, #F2542D 55%, #FFC93C 100%)" }}
        >
          Continuar
        </button>
        {!canContinue && (
          <p className="text-[11px] text-neutral-300 text-center mt-2.5">
            Escolha pelo menos {maxPrimary} interesses principais para continuar
          </p>
        )}
      </div>

      <RefineSheet
        interest={refineFor}
        subOptions={refineFor ? SUB_INTERESTS[refineFor.id] : []}
        selectedSubs={refineFor ? refinements[refineFor.id] || [] : []}
        onToggleSub={(subId) => {
          if (!refineFor) return;
          setRefinements((prev) => {
            const current = prev[refineFor.id] || [];
            const next = current.includes(subId)
              ? current.filter((s) => s !== subId)
              : [...current, subId];
            return { ...prev, [refineFor.id]: next };
          });
        }}
        onClose={() => setRefineFor(null)}
      />
    </div>
  );
}

function PersonProfilePopup({ person, onClose, userInterests = [], onStartChat }) {
  const [phase, setPhase] = useState("ask"); // ask | sent | accepted

  useEffect(() => {
    if (phase === "sent") {
      const t = setTimeout(() => setPhase("accepted"), 1300);
      return () => clearTimeout(t);
    }
  }, [phase]);

  if (!person) return null;

  const sharedInterests = (person.interests || [])
    .filter((id) => userInterests.includes(id))
    .map((id) => findInterestTag(id))
    .filter(Boolean);

  // Splash de "convite aceito" — ocupa a tela toda dentro do box
  if (phase === "accepted") {
    return (
      <div className="absolute inset-0 z-40 flex items-center justify-center bg-white">
        <div className="flex flex-col items-center text-center px-10 animate-[fadeInSplash_.4s_ease-out] w-full max-w-xs">
          <style>{`
            @keyframes fadeInSplash { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }

          <img src={LOGO_SRC} alt="E ai?" className="h-12 w-auto mb-6" draggable={false} />

            className="w-16 h-16 rounded-full flex items-center justify-center mb-5 shadow-lg"
            style={{ background: "linear-gradient(135deg, #22D3B0 0%, #2E86DE 100%)" }}

            <Check size={28} className="text-white" strokeWidth={3} />
          </div>
          <p className="text-2xl font-bold text-neutral-900 tracking-tight leading-snug">
            Seu convite foi aceito!
          </p>
          <p className="text-sm text-neutral-400 mt-2">
            Converse com <span className="font-medium text-neutral-700">{person.name}</span>
          </p>

          <button
            onClick={() => onStartChat?.(person)}
            className="w-full flex items-center justify-center gap-2 text-white rounded-full py-4 text-base font-semibold mt-8 active:scale-95 transition-transform shadow-lg"
            style={{ background: "linear-gradient(135deg, #22D3B0 0%, #2E86DE 100%)" }}

            <MessageIcon size={18} />
            Abrir chat

            onClick={onClose}
            className="text-sm text-neutral-400 mt-4 active:opacity-60 transition-opacity"

        <p className="text-lg font-semibold text-neutral-900 tracking-tight">{person.name}</p>
        <p className="text-xs text-neutral-400 mt-0.5">Mesmo perfil que você</p>

        {sharedInterests.length > 0 && (

function ChatScreen({ person, onClose, onSaveContact, onInviteAnother }) {
  const [messages, setMessages] = useState([
    { from: "guest", text: `Oba! Bora sim 😄 Te vejo lá!` },
  ]);
  const [draft, setDraft] = useState("");
  const [menuOpen, setMenuOpen] = useState(false);
  const [savedToast, setSavedToast] = useState(false);
  const endRef = useRef(null);

  useEffect(() => {
    endRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages]);

  function handleSend() {
    if (!draft.trim()) return;
    setMessages((prev) => [...prev, { from: "user", text: draft.trim() }]);
    setDraft("");
  }

  function handleSaveContact() {
    onSaveContact?.(person);
    setMenuOpen(false);
    setSavedToast(true);
    setTimeout(() => setSavedToast(false), 1800);
  }

  if (!person) return null;

  return (
    <div className="h-full w-full bg-white flex flex-col overflow-hidden relative">
      <div className="flex items-center gap-3 px-5 pt-8 pb-3 border-b border-neutral-100 shrink-0">
        <button
          onClick={onClose}
          className="w-10 h-10 rounded-full bg-neutral-100 flex items-center justify-center active:scale-95 transition-transform shrink-0"
        >
          <X size={18} className="text-neutral-700" />
        </button>
        <div
          className="w-9 h-9 rounded-full flex items-center justify-center text-white text-xs font-semibold shrink-0"
          style={{ background: "linear-gradient(135deg, #FF6B9D 0%, #7B2FF7 100%)" }}
        >
          {person.initials}
        </div>
        <div className="flex-1 min-w-0">
          <p className="font-medium text-neutral-900 text-sm leading-tight truncate">{person.name}</p>
          <p className="text-[11px] text-emerald-500 flex items-center gap-1 leading-tight mt-0.5">
            <span className="w-1.5 h-1.5 rounded-full bg-emerald-500" /> online agora
          </p>
        </div>

        <div className="relative shrink-0">
          <button
            onClick={() => setMenuOpen((v) => !v)}
            className="w-10 h-10 rounded-full bg-neutral-100 flex items-center justify-center active:scale-95 transition-transform"
          >
            <MoreVertical size={18} className="text-neutral-700" />
          </button>

          {menuOpen && (
            <>
              <div className="fixed inset-0 z-30" onClick={() => setMenuOpen(false)} />
              <div className="absolute right-0 top-12 z-40 w-56 bg-white rounded-2xl shadow-2xl border border-neutral-100 py-2 overflow-hidden">
                <button
                  onClick={handleSaveContact}
                  className="w-full flex items-center gap-3 px-4 py-3 text-left hover:bg-neutral-50 active:bg-neutral-100 transition-colors"
                >
                  <UserPlus size={16} className="text-neutral-500 shrink-0" />
                  <span className="text-sm text-neutral-800">Salvar contato</span>
                </button>
                <button
                  onClick={() => {
                    setMenuOpen(false);
                    onInviteAnother?.();
                  }}
                  className="w-full flex items-center gap-3 px-4 py-3 text-left hover:bg-neutral-50 active:bg-neutral-100 transition-colors"
                >
                  <Users size={16} className="text-neutral-500 shrink-0" />
                  <span className="text-sm text-neutral-800">Convidar outra pessoa</span>
                </button>
                <div className="h-px bg-neutral-100 my-1" />
                <button
                  onClick={() => {
                    setMenuOpen(false);
                    onClose?.();
                  }}
                  className="w-full flex items-center gap-3 px-4 py-3 text-left hover:bg-red-50 active:bg-red-100 transition-colors"
                >
                  <LogIn size={16} className="text-red-500 shrink-0 rotate-180" />
                  <span className="text-sm text-red-500 font-medium">Sair do chat</span>
                </button>
              </div>
            </>
          )}
        </div>
      </div>

      {savedToast && (
        <div className="absolute top-20 left-1/2 -translate-x-1/2 z-50 bg-neutral-900 text-white text-xs font-medium px-4 py-2 rounded-full shadow-lg flex items-center gap-2 animate-[fadeInSplash_.3s_ease-out]">
          <Check size={14} /> Contato salvo em Meus contatos
        </div>
      )}

      <div className="px-5 pt-4 shrink-0">
        <div className="bg-neutral-50 rounded-2xl px-4 py-3 flex items-center gap-2.5">
          <Lock size={14} className="text-neutral-400 shrink-0" />
          <p className="text-[11px] text-neutral-400 leading-snug">
            Números de telefone ocultos. Privacidade total MTC.
          </p>
        </div>
      </div>

      <div className="flex-1 overflow-y-auto px-5 py-4 space-y-3">
        {messages.map((m, i) => (
          <div key={i} className={`flex ${m.from === "user" ? "justify-end" : "justify-start"}`}>
            <div
              className={`max-w-[75%] px-4 py-2.5 rounded-3xl text-sm leading-snug ${
                m.from === "user"
                  ? "bg-blue-500 text-white rounded-br-md"
                  : "bg-neutral-100 text-neutral-800 rounded-bl-md"
              }`}
            >
              {m.text}
            </div>
          </div>
        ))}
        <div ref={endRef} />
      </div>

      <div className="p-4 pt-2 border-t border-neutral-100 flex items-center gap-2 shrink-0">
        <input
          value={draft}
          onChange={(e) => setDraft(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && handleSend()}
          placeholder="Escreva uma mensagem…"
          className="flex-1 bg-neutral-100 rounded-3xl px-4 py-3 text-sm outline-none placeholder:text-neutral-400"
        />
        <button
          onClick={handleSend}
          disabled={!draft.trim()}
          className="w-11 h-11 rounded-full bg-neutral-900 flex items-center justify-center shrink-0 disabled:opacity-30 active:scale-95 transition-transform"
        >
          <Send size={16} className="text-white" />
        </button>
      </div>
    </div>
  );
}

            </div>
          </div>
        ))}

      {/* pins de pessoas com o mesmo perfil por perto */}
      {isPeopleNearby &&
        PEOPLE_NEARBY.map((p) => (
          <button
            key={p.id}
            onClick={() => setSelectedPerson(p)}
            className="absolute -translate-x-1/2 -translate-y-1/2 z-10 flex flex-col items-center gap-1 active:scale-90 transition-transform"
            style={{ left: p.x, top: p.y }}
            title={p.name}
          >
            <div
              className="w-11 h-11 rounded-full shadow-lg flex items-center justify-center text-white text-xs font-semibold border-2 border-white"
              style={{ background: "linear-gradient(135deg, #FF6B9D 0%, #7B2FF7 100%)" }}
            >
              {p.initials}
            </div>
          </button>
        ))}

      {isPeopleNearby && (
        <PersonProfilePopup
          person={selectedPerson}
          onClose={() => setSelectedPerson(null)}
          userInterests={userInterests}
          onStartChat={onStartChat}
        />
      )}

      {/* box flutuante de convite (fluxo padrão) */}
      {!isCoupons && !isPeopleNearby && (
        <div className="absolute inset-x-6 top-1/2 -translate-y-1/2 z-20">
          <div className="relative">
            <div
              className="absolute -inset-4 opacity-40 blur-2xl"
              style={{
                borderRadius: "3.5rem",
                background:
                  "linear-gradient(135deg, #7B2FF7 0%, #F2542D 55%, #FFC93C 100%)",
              }}
            />
            <div
              className="relative bg-white shadow-2xl px-8 py-10 flex flex-col items-center text-center"
              style={{ borderRadius: "3rem" }}
            >
              <img src={LOGO_SRC} alt="E ai?" className="h-16 w-auto mb-6" draggable={false} />
              <p className="text-[32px] leading-[1.15] font-bold text-neutral-900 tracking-tight">
                Topa convidar
                <br />
                alguém perto de você?
              </p>

              <div className="flex items-center gap-3 mt-8 w-full">
                <button
                  className="flex-1 text-white rounded-full py-4 text-lg font-semibold active:scale-95 transition-transform"
                  style={{ background: "linear-gradient(135deg, #22D3B0 0%, #2E86DE 100%)" }}
                >
                  Sim
                </button>
                <button
                  className="flex-1 text-white rounded-full py-4 text-lg font-semibold active:scale-95 transition-transform"
                  style={{ background: "linear-gradient(135deg, #FFC93C 0%, #7B2FF7 100%)" }}
                >
                  Não
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {isCoupons && (
        <CouponPopup
          coupon={selectedCoupon}
          onClose={() => setSelectedCoupon(null)}
          onGoToMeusCupons={onGoToMeusCupons}
          onClaim={onClaimCoupon}
        />
      )}
    </div>
  );
}

// ------------------------------------------------------------------
// APP PRINCIPAL
// ------------------------------------------------------------------

function EaiApp() {
  const [entered, setEntered] = useState(false);
  const [stage, setStage] = useState("splash"); // splash | cadastro | perfil | home | map | meusCupons | meusEventos | chat | meusContatos
  const [splashVisible, setSplashVisible] = useState(true);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [lang, setLang] = useState("PT");
  const [activityName, setActivityName] = useState("Criar evento");
  const [myCoupons, setMyCoupons] = useState(INITIAL_MY_COUPONS);
  const [avatarPhoto, setAvatarPhoto] = useState(null);
  const [myEventPins, setMyEventPins] = useState([]);
  const [chatPerson, setChatPerson] = useState(null);
  const [contacts, setContacts] = useState([]);

  function saveContact(person) {
    if (!person) return;
    setContacts((prev) => (prev.some((c) => c.name === person.name) ? prev : [...prev, person]));
  }
  const [eventsList, setEventsList] = useState(EVENTS);
  const [userAddress, setUserAddress] = useState("");
  const [userInterests, setUserInterests] = useState([]);

  function claimCoupon(coupon) {
    setMyCoupons((prev) => (prev.some((c) => c.id === coupon.id) ? prev : [coupon, ...prev]));
  }

  function addEventPin(event) {
    const pin = {
      ...event,
      x: `${20 + Math.random() * 55}%`,
      y: `${28 + Math.random() * 45}%`,
    };
    setMyEventPins((prev) => [...prev, pin]);
  }

  useEffect(() => {
    const t = requestAnimationFrame(() => setEntered(true));
    return () => cancelAnimationFrame(t);
  }, []);

  useEffect(() => {
    const toHome = setTimeout(() => {
      setSplashVisible(false);
      setTimeout(() => setStage("cadastro"), 900);
    }, 3200);
    return () => clearTimeout(toHome);
  }, []);

  return (
    <div className="w-full min-h-screen bg-neutral-200 flex justify-center">
    <div className="w-full max-w-md h-screen bg-white relative overflow-hidden">
      <style>{`
        @keyframes logoIn {
          from { opacity: 0; transform: scale(0.9); }
          to { opacity: 1; transform: scale(1); }
        }
        @keyframes dotPulse {
          0%, 80%, 100% { opacity: 0.25; transform: scale(0.75); }
          40% { opacity: 1; transform: scale(1); }
        }
        @keyframes homeFadeIn {
          from { opacity: 0; transform: translateY(8px); }
          to { opacity: 1; transform: translateY(0); }
        }

        input[type="range"] {
          -webkit-appearance: none;
          appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
          -webkit-appearance: none;
          appearance: none;
          box-sizing: border-box;
          width: 30px;
          height: 30px;
          border-radius: 9999px;
          background: #3B82F6;
          border: 4px solid #ffffff;
          box-shadow: 0 2px 8px rgba(0,0,0,0.25);
          cursor: pointer;
          margin-top: -12px;
        }
        input[type="range"]::-moz-range-thumb {
          width: 30px;
          height: 30px;
          border-radius: 9999px;
          background: #3B82F6;
          border: 4px solid #ffffff;
          box-shadow: 0 2px 8px rgba(0,0,0,0.25);
          cursor: pointer;
        }
        input[type="range"]::-webkit-slider-runnable-track {
          height: 6px;
          border-radius: 9999px;
        }
        input[type="range"]::-moz-range-track {
          height: 6px;
          border-radius: 9999px;
        }
      `}</style>

      {stage === "splash" && (
        <div
          className="min-h-screen flex flex-col items-center justify-center gap-10 px-8 transition-opacity"
          style={{ opacity: splashVisible ? 1 : 0, transitionDuration: "900ms", transitionTimingFunction: "ease-in-out" }}
        >
          <img
            src={LOGO_SRC}
            alt="E ai?"
            className="w-64 h-auto sm:w-72"
            draggable={false}
            style={{
              animation: entered ? "logoIn 1.1s cubic-bezier(0.22, 1, 0.36, 1) both" : "none",
              opacity: entered ? undefined : 0,
            }}
          />

          <div className="flex items-center gap-2">
            {[0, 1, 2].map((i) => (
              <span
                key={i}
                className="w-2 h-2 rounded-full bg-neutral-300"
                style={{
                  animation: "dotPulse 1.5s ease-in-out infinite",
                  animationDelay: `${i * 0.22}s`,
                }}
              />
            ))}
          </div>
        </div>
      )}

      {stage === "cadastro" && (
        <div className="h-full" style={{ animation: "homeFadeIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both" }}>
          <CadastroScreen
            onFinish={({ photo, address }) => {
              if (photo) setAvatarPhoto(photo);
              if (address) setUserAddress(address);
              setStage("perfil");
            }}
          />
        </div>
      )}

      {stage === "perfil" && (
        <div className="h-full" style={{ animation: "homeFadeIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both" }}>
          <ProfileInterestsScreen
            onContinue={(interests) => {
              setUserInterests(interests);
              setStage("home");
            }}
            onOpenDrawer={() => setDrawerOpen(true)}
            avatarPhoto={avatarPhoto}
            onLogout={() => {
              setAvatarPhoto(null);
              setStage("cadastro");
            }}
          />
        </div>
      )}

      {stage === "home" && (
        <div className="h-full" style={{ animation: "homeFadeIn 1s cubic-bezier(0.22, 1, 0.36, 1) both" }}>
          <Home
            onOpenDrawer={() => setDrawerOpen(true)}
            onNavigateMap={(name) => {
              setActivityName(name);
              setStage("map");
            }}
            avatarPhoto={avatarPhoto}
            onLogout={() => {
              setAvatarPhoto(null);
              setStage("cadastro");
            }}
            onEventCreated={addEventPin}
            eventsList={eventsList}
            setEventsList={setEventsList}
          />
        </div>
      )}

      {stage === "map" && (
        <div className="h-full" style={{ animation: "homeFadeIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both" }}>
          <MapScreen
            onBack={() => setStage("home")}
            activityName={activityName}
            onClaimCoupon={claimCoupon}
            myEventPins={myEventPins}
            userAddress={userAddress}
            userInterests={userInterests}
            onOpenDrawer={() => setDrawerOpen(true)}
            avatarPhoto={avatarPhoto}
            onLogout={() => {
              setAvatarPhoto(null);
              setStage("cadastro");
            }}
            onGoToMeusCupons={() => {
              setStage("home");
              setDrawerOpen(true);
            }}
            onStartChat={(person) => {
              setChatPerson(person);
              setStage("chat");
            }}
          />
        </div>
      )}

      {stage === "meusCupons" && (
        <div className="h-full" style={{ animation: "homeFadeIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both" }}>
          <MeusCuponsScreen
            myCoupons={myCoupons}
            onOpenDrawer={() => setDrawerOpen(true)}
            avatarPhoto={avatarPhoto}
            onLogout={() => {
              setAvatarPhoto(null);
              setStage("cadastro");
            }}
            onBack={() => setStage("home")}
          />
        </div>
      )}

      {stage === "meusEventos" && (
        <div className="h-full" style={{ animation: "homeFadeIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both" }}>
          <MeusEventosScreen
            myEvents={eventsList.filter((e) => e.createdBy === PROFILE.name)}
            onOpenDrawer={() => setDrawerOpen(true)}
            avatarPhoto={avatarPhoto}
            onLogout={() => {
              setAvatarPhoto(null);
              setStage("cadastro");
            }}
            onBack={() => setStage("home")}
            onDeleteEvent={(id) => setEventsList((prev) => prev.filter((e) => e.id !== id))}
          />
        </div>
      )}

      {stage === "chat" && (
        <div className="h-full" style={{ animation: "homeFadeIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) both" }}>
          <ChatScreen
            person={chatPerson}
            onClose={() => {
              setChatPerson(null);
              setStage("map");
            }}
            onSaveContact={saveContact}
            onInviteAnother={() => {
              setChatPerson(null);
              setActivityName("Quem está por perto");
              setStage("map");
            }}
          />
        </div>
      )}

      {stage === "meusContatos" && (
        <div className="h-full" style={{ animation: "homeFadeIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both" }}>
          <MeusContatosScreen
            contacts={contacts}
            onOpenDrawer={() => setDrawerOpen(true)}
            avatarPhoto={avatarPhoto}
            onLogout={() => {
              setAvatarPhoto(null);
              setStage("cadastro");
            }}
            onBack={() => setStage("home")}
            onOpenChat={(person) => {
              setChatPerson(person);
              setStage("chat");
            }}
          />
        </div>
      )}

      {stage !== "splash" && stage !== "cadastro" && (
        <SideDrawer
          open={drawerOpen}
          onClose={() => setDrawerOpen(false)}
          lang={lang}
          setLang={setLang}
          onGoHome={() => {
            setDrawerOpen(false);
            setStage("home");
          }}
          onGoToMeusCupons={() => {
            setDrawerOpen(false);
            setStage("meusCupons");
          }}
          onGoToMeusEventos={() => {
            setDrawerOpen(false);
            setStage("meusEventos");
          }}
          onGoToMeusContatos={() => {
            setDrawerOpen(false);
            setStage("meusContatos");
          }}
        />
      )}
    </div>
    </div>
  );
}

const rootEl = document.getElementById("root");
ReactDOM.createRoot(rootEl).render(<EaiApp />);
  </script>
</body>
</html>
